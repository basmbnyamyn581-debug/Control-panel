[data-theme="light"] .mdb pre{background:#0f1422;}

body{transition:background .25s,color .25s;}

.mdb ul,.mdb ol{padding-right:20px;margin:5px 0;}

.mdb .ic{background:var(--bd);padding:1px 5px;border-radius:4px;font-size:.88em;color:#fbbf24;}
.mdb a{color:var(--c1);}
.mdb blockquote{border-right:3px solid var(--c1);padding-right:10px;color:var(--mt);margin:6px 0;}
.mdb b,.mdb strong{font-weight:700;}
.mdb i,.mdb em{font-style:italic;}

.dot:nth-child(2){animation:bounce .9s .2s infinite;}
.dot:nth-child(3){animation:bounce .9s .4s infinite;}

// تنسيق رد المساعد للعرض: يفصل <thinking> في قسم قابل للطي، ويحذف وسوم الأدوات الداخلية
function formatAssistantContent(text,isStreaming){

// استخراج [MEMORY: ...] من رد الـ AI، حفظه في S.memory، وإزالته من النص المعروض
function extractMemories(text){
  if(!S.memoryEnabled)return text;
  const re=/\[MEMORY:\s*([^\]]+)\]/gi;
  let m;let found=false;
  while((m=re.exec(text))){
    const fact=m[1].trim();
    if(fact&&!S.memory.includes(fact)){
      S.memory.push(fact);
      if(S.memory.length>40)S.memory.shift();
      found=true;
    }
  }
  if(found){lss("nx7_memory",S.memory);const uid=currentUID();if(uid)fbD("nx7/users/"+uid+"/memory",S.memory);}
  return text.replace(re,"").trim();
}

// FALLBACK AI CALL
// ══════════════════════════════════════
const RLMSGS=["rate limit","quota","limit exceeded","too many","credits","insufficient","429","503","529"];
const isRL=(e)=>RLMSGS.some(k=>(e.message||"").toLowerCase().includes(k));

async function callAI(messages,system,stream=false,onChunk=null,signal=null){
  const order=[S.global.activeProvider];
  if(S.global.fallbackEnabled){PROVIDERS.forEach(p=>{if(p.id!==S.global.activeProvider&&hasKey(p.id))order.push(p.id);});}
  let lastErr=null;
  for(let i=0;i<order.length;i++){
    const pid=order[i];const prov=PROVIDERS.find(p=>p.id===pid);
    const key=(S.global.apiKeys[pid]||"").trim();
    if(!prov||!key)continue;
    const model=S.global.providerModels[pid]||prov.models[0].id;
    const msgs=messages.map(m=>({role:m.role,content:typeof m.content==="string"?m.content:gt(m.c||""),images:m.images}));
    try{
      const r=await prov.call(key,model,msgs,system,stream,(chunk)=>{if(_stopFlag)return;onChunk&&onChunk(chunk);},signal);
      delete S.providerErrors[pid];
      if(i>0)notify("✅ تحويل لـ "+prov.name);
      return{text:r,provider:pid};
    }catch(e){
      if(e.name==="AbortError")throw e;
      lastErr=e;S.providerErrors[pid]=e.message;
      if(S.global.fallbackEnabled&&isRL(e)&&i<order.length-1){
        const nxt=PROVIDERS.find(p=>p.id===order[i+1]);
        notify("⚠️ "+prov.name+" حده انتهى — أجرّب "+(nxt?.name||"")+"...","warn");
        continue;
      }
      throw e;
    }
  }
  throw lastErr||new Error("لا يوجد API متاح — تواصل مع الأدمن");
}

// تنفيذ كود Python داخل المتصفح (Pyodide)
// ══════════════════════════════════════
let _pyBlockCounter=0;const _pyBlocks={};
let _pyodide=null,_pyodideLoading=null;
async function loadPyodideOnce(){
  if(_pyodide)return _pyodide;
  if(_pyodideLoading)return _pyodideLoading;
  _pyodideLoading=(async()=>{
    if(!window.loadPyodide){
      await new Promise((resolve,reject)=>{
        const s=document.createElement("script");
        s.src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js";
        s.onload=resolve;s.onerror=()=>reject(new Error("فشل تحميل Pyodide"));
        document.head.appendChild(s);
      });
    }
    _pyodide=await loadPyodide();
    return _pyodide;
  })();
  return _pyodideLoading;
}
async function runPyCode(id){
  const btn=document.getElementById("py-btn-"+id);
  const out=document.getElementById("py-out-"+id);
  const code=_pyBlocks[id];
  if(!code||!out)return;
  out.style.display="block";out.textContent="⏳ جاري تحميل بيئة Python (أول مرة فقط، قد يستغرق وقتاً)...";
  if(btn){btn.disabled=true;btn.textContent="⏳...";}
  try{
    const pyo=await loadPyodideOnce();
    out.textContent="⏳ جاري التنفيذ...";
    await pyo.runPythonAsync("import sys, io\nsys.stdout = io.StringIO()\nsys.stderr = sys.stdout");
    let result;
    try{
      result=await pyo.runPythonAsync(code);
    }catch(err){
      const printed=await pyo.runPythonAsync("sys.stdout.getvalue()");
      out.textContent=(printed||"")+"\n❌ "+String(err.message||err);
      if(btn){btn.disabled=false;btn.textContent="▶ تشغيل";}
      return;
    }
    const printed=await pyo.runPythonAsync("sys.stdout.getvalue()");
    let display=printed||"";
    if(result!==undefined&&result!==null&&String(result)!=="undefined")display+=(display?"\n":"")+"=> "+String(result);
    out.textContent=display||"(تم التنفيذ بدون مخرجات)";
  }catch(e){
    out.textContent="❌ تعذّر تشغيل بيئة Python: "+e.message;
  }
  if(btn){btn.disabled=false;btn.textContent="▶ تشغيل";}
}

function renderMD(raw){
  if(!raw)return"";let t=raw;
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const l=lang||"code";
    const trimmed=code.trim();
    const isPy=/^(python|py)$/i.test(l);
    let runBtn="",outDiv="";
    if(isPy){
      const id="py"+(_pyBlockCounter++);
      _pyBlocks[id]=trimmed;
      runBtn=`<button id="py-btn-${id}" onclick="runPyCode('${id}')" style="background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#10b981;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit;margin-left:4px">▶ تشغيل</button>`;
      outDiv=`<div id="py-out-${id}" style="display:none;background:#060810;border-top:1px solid var(--bd);padding:10px 12px;font-family:'Courier New',monospace;font-size:11px;color:#a5f3fc;white-space:pre-wrap;max-height:200px;overflow-y:auto"></div>`;
    }
    return`<pre class="mdb"><div class="lb"><span>${l}</span><span>${runBtn}<button onclick="navigator.clipboard.writeText(${JSON.stringify(trimmed)});notify('✓ كود منسوخ')" style="background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.3);color:#22d3ee;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit">📋 نسخ</button></span></div><code>${esc(trimmed)}</code>${outDiv}</pre>`;
  });
  t=t.replace(/`([^`\n]+)`/g,'<code class="ic">$1</code>');
  t=t.replace(/^### (.+)$/gm,'<h3 class="mdb">$1</h3>');
  t=t.replace(/^## (.+)$/gm,'<h2 class="mdb">$1</h2>');
  t=t.replace(/^# (.+)$/gm,'<h1 class="mdb">$1</h1>');
  t=t.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");t=t.replace(/\*(.+?)\*/g,"<i>$1</i>");
  t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  t=t.replace(/(\|.+\|\n)+/g,tbl=>{
    const rows=tbl.trim().split("\n");if(rows.length<2)return tbl;
    const hdr=`<tr>${rows[0].split("|").filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<th>${c.trim()}</th>`).join("")}</tr>`;
    const bdy=rows.slice(2).map(r=>`<tr>${r.split("|").filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<td>${c.trim()}</td>`).join("")}</tr>`).join("");
    return`<table class="mdb"><thead>${hdr}</thead><tbody>${bdy}</tbody></table>`;
  });
  t=t.replace(/^[-*] (.+)$/gm,"<li>$1</li>");
  t=t.replace(/^(\d+)\. (.+)$/gm,"<li>$2</li>");
  t=t.replace(/(<li>[\s\S]+?<\/li>\n?)+/g,m=>`<ul class="mdb">${m}</ul>`);
  t=t.replace(/^> (.+)$/gm,'<blockquote class="mdb">$1</blockquote>');
  t=t.replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--bd);margin:10px 0"/>');
  return t.split(/\n\n+/).map(p=>{p=p.trim();if(!p)return"";if(/^<(h[1-3]|ul|ol|pre|blockquote|hr|table)/.test(p))return p;return`<p class="mdb">${p.replace(/\n/g,"<br/>")}</p>`;}).join("");
}

// WEB SEARCH (Wikipedia — مجاني بدون مفتاح)
// ══════════════════════════════════════
async function wikiSearch(query){
  const langs=["ar","en"];
  for(const lang of langs){
    try{
      const sUrl=`https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`;
      const sRes=await fetch(sUrl);if(!sRes.ok)continue;
      const sData=await sRes.json();
      const results=sData?.query?.search||[];
      if(!results.length)continue;
      const parts=results.map(r=>{
        const snippet=(r.snippet||"").replace(/<[^>]+>/g,"");
        return`### ${r.title}\n${snippet}...`;
      });
      return{lang,text:parts.join("\n\n"),titles:results.map(r=>r.title)};
    }catch{continue;}
  }
  return null;
}

function speakMsg(id,_text){
  if(!("speechSynthesis" in window)){notify("🔊 المتصفح ده مايدعمش القراءة الصوتية","warn");return;}
  if(S.speakingId===id){speechSynthesis.cancel();S.speakingId=null;renderMsgs();return;}
  const m=findMsg(id);if(!m)return;
  const text=gt(m.c);
  speechSynthesis.cancel();
  const clean=text.replace(/```[\s\S]*?```/g,"").replace(/\[MEMORY:[\s\S]*?\]/gi,"").replace(/[*_#>`]/g,"");
  const u=new SpeechSynthesisUtterance(clean);
  u.lang="ar-EG";u.rate=1;
  u.onend=()=>{S.speakingId=null;renderMsgs();if(S.voiceMode)setTimeout(voiceListenCycle,400);};
  u.onerror=()=>{S.speakingId=null;renderMsgs();if(S.voiceMode)setTimeout(voiceListenCycle,400);};
  S.speakingId=id;renderMsgs();
  speechSynthesis.speak(u);
}

function currentInitial(){return(currentName()[0]||"U").toUpperCase();}

  "auth/invalid-email":"❌ بريد إلكتروني غير صحيح",

  "auth/user-not-found":"❌ البريد أو كلمة السر غير صحيحة",
  "auth/wrong-password":"❌ البريد أو كلمة السر غير صحيحة",
  "auth/invalid-credential":"❌ البريد أو كلمة السر غير صحيحة",

async function ensureUserDoc(user,nameOverride){
  const upath="nx7/users/"+user.uid;
  let udata=await fb.get(upath);
  if(!udata){
    udata={name:nameOverride||user.displayName||user.email?.split("@")[0]||"مستخدم",email:user.email||"",created:Date.now(),premium:{active:false,expiry:null},msgCount:0,convs:{}};
    await fb.set(upath,udata);
  }
  return udata;
}

async function doLogin(){
  const email=(document.getElementById("a-email")?.value||"").trim();
  const pass=document.getElementById("a-pass")?.value||"";
  const errEl=document.getElementById("a-err");const btn=document.getElementById("a-btn");
  if(!email||!pass){if(errEl){errEl.textContent="❌ أدخل البريد وكلمة السر";errEl.style.display="block";}return;}
  if(btn)btn.textContent="⏳ جارٍ...";
  try{
    await firebase.auth().signInWithEmailAndPassword(email,pass);
    // onAuthStateChanged هيكمل باقي العملية تلقائياً
  }catch(e){
    if(errEl){errEl.textContent=authErr(e.code);errEl.style.display="block";}
    if(btn)btn.textContent="🔑 دخول";
  }
}

async function doRegister(){
  const name=(document.getElementById("a-name")?.value||"").trim();
  const email=(document.getElementById("a-email")?.value||"").trim();
  const pass=document.getElementById("a-pass")?.value||"";
  const errEl=document.getElementById("a-err");const btn=document.getElementById("a-btn");
  if(!name){if(errEl){errEl.textContent="❌ أدخل اسمك";errEl.style.display="block";}return;}
  if(!email||!pass){if(errEl){errEl.textContent="❌ أدخل البريد وكلمة السر";errEl.style.display="block";}return;}
  if(pass.length<6){if(errEl){errEl.textContent="❌ كلمة السر يجب أن تكون 6 أحرف على الأقل";errEl.style.display="block";}return;}
  if(btn)btn.textContent="⏳ جارٍ...";
  try{
    const cred=await firebase.auth().createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    await ensureUserDoc(cred.user,name);
    // onAuthStateChanged هيكمل باقي العملية تلقائياً
  }catch(e){
    if(errEl){errEl.textContent=authErr(e.code);errEl.style.display="block";}
    if(btn)btn.textContent="✨ إنشاء حساب";
  }
}

async function googleSignIn(){
  const errEl=document.getElementById("a-err");
  try{
    await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
    // onAuthStateChanged هيكمل باقي العملية تلقائياً
  }catch(e){
    if(e.code!=="auth/popup-closed-by-user"&&errEl){errEl.textContent=authErr(e.code);errEl.style.display="block";}
  }
}

async function doForgotPassword(){
  const email=(document.getElementById("f-email")?.value||"").trim();
  const errEl=document.getElementById("a-err");const okEl=document.getElementById("a-ok");const btn=document.getElementById("a-btn");
  if(!email){if(errEl){errEl.textContent="❌ أدخل بريدك الإلكتروني";errEl.style.display="block";}return;}
  if(btn)btn.textContent="⏳ جارٍ...";
  try{
    await firebase.auth().sendPasswordResetEmail(email);
    if(okEl){okEl.textContent="✅ تم إرسال رابط إعادة التعيين إلى بريدك — تحقق من صندوق الوارد (وملف الـ Spam)";okEl.style.display="block";}
    if(errEl)errEl.style.display="none";
  }catch(e){
    if(errEl){errEl.textContent=authErr(e.code);errEl.style.display="block";}
  }
  if(btn)btn.textContent="إرسال رابط إعادة التعيين";
}

async function loadUserData(uid,udata){
  const fc=await fb.get("nx7/users/"+uid+"/convs");
  if(fc){const a=Object.values(fc).filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0));if(a.length){S.convs=a;S.aid=a[0].id;lss("nx7_convs",a);}}
  if(udata.premium){S.premium=udata.premium;lss("nx7_prem",udata.premium);}
  if(udata.msgCount!==undefined){S.msgCount=udata.msgCount;lss("nx7_mc",udata.msgCount);}
  if(udata.memory){S.memory=udata.memory;lss("nx7_memory",S.memory);}
  if(udata.memoryEnabled!==undefined){S.memoryEnabled=udata.memoryEnabled;lss("nx7_memEnabled",S.memoryEnabled);}
  if(udata.knowledge){S.knowledge=udata.knowledge;lss("nx7_knowledge",S.knowledge);}
  S.userData=udata;
  const fg=await fb.get("nx7/o/global");
  if(fg){if(fg.apiKeys)fg.apiKeys=decKeys(fg.apiKeys);Object.assign(S.global,fg);lss("nx7_global",S.global);}
  const fs=await fb.get("nx7/users/"+uid+"/settings");
  if(fs){Object.assign(S.settings,fs);lss("nx7_settings",S.settings);}
  S.fbSync="done";applyTheme();
}

function doLogout(){
  firebase.auth().signOut();
  S.convs=[];S.aid="";S.streaming=false;S.premium={active:false,expiry:null};S.userData=null;
  lss("nx7_prem",S.premium);
  // onAuthStateChanged هيعرض شاشة الدخول تلقائياً
}


function syncNow(){
  if(!isUserAuthed()){notify("سجّل الدخول أولاً","warn");return;}
  const uid=currentUID();
  S.fbSync="syncing";updateFBBadge();
  Promise.all([
    fb.get("nx7/users/"+uid+"/convs"),
    fb.get("nx7/users/"+uid+"/premium"),
    fb.get("nx7/o/global")
  ]).then(([fc,fp,fg])=>{
    if(fc){const a=Object.values(fc).filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0));if(a.length){S.convs=a;S.aid=a[0].id;lss("nx7_convs",a);}}
    if(fp){S.premium=fp;lss("nx7_prem",fp);}
    if(fg){if(fg.apiKeys)fg.apiKeys=decKeys(fg.apiKeys);Object.assign(S.global,fg);lss("nx7_global",S.global);}
    S.fbSync="done";notify("☁️ تم التزامن");applyTheme();render();
    const cl=document.getElementById("conv-list");if(cl)cl.innerHTML=convListHTML();
  }).catch(()=>{S.fbSync="error";notify("⚠️ خطأ في التزامن","warn");});
}

async function activateCode(){
  const code=(document.getElementById("code-inp")?.value||"").trim().toUpperCase();
  const msgEl=document.getElementById("code-msg");
  if(!code){if(msgEl)msgEl.innerHTML='<span style="color:#ef4444">❌ أدخل الكود أولاً</span>';return;}
  if(msgEl)msgEl.innerHTML='<span style="color:#aaa">🔄 جاري التحقق...</span>';
  const fbCodes=await fb.get("nx7/codes");
  let codes=fbCodes?Object.values(fbCodes).filter(Boolean):lsg("nx7_codes",[]);
  S.codes=codes;lss("nx7_codes",codes);
  const found=codes.find(c=>c.code===code&&!c.used);
  if(!found){if(msgEl)msgEl.innerHTML='<span style="color:#ef4444">❌ الكود غير صحيح أو مستخدم</span>';return;}
  const usedEntry={...found,used:true,usedAt:Date.now()};
  await fb.set("nx7/codes/"+found.code,usedEntry);
  const verify=await fb.get("nx7/codes/"+found.code);
  if(!verify||verify.usedAt!==usedEntry.usedAt){
    if(msgEl)msgEl.innerHTML='<span style="color:#ef4444">❌ الكود استُخدم للتو — جرب كوداً آخر</span>';return;}
  S.premium={active:true,expiry:Date.now()+(found.days*86400000)};
  lss("nx7_prem",S.premium);
  const updatedCodes=codes.map(c=>c.code===code?usedEntry:c);
  S.codes=updatedCodes;lss("nx7_codes",updatedCodes);
  if(msgEl)msgEl.innerHTML=`<span style="color:#10b981">✅ تم التفعيل لمدة ${found.days} يوم!</span>`;
  const uid=currentUID();
  if(isUserAuthed()&&uid){fbD("nx7/users/"+uid+"/premium",S.premium);}
  notify("🎉 Premium مفعّل!");
}

    <div style="position:relative">

      <div id="persona-menu" style="display:none;position:absolute;top:calc(100% + 5px);right:0;background:var(--cb);border:1px solid var(--bd);border-radius:10px;padding:5px;z-index:500;min-width:170px;box-shadow:0 12px 40px rgba(0,0,0,.7)">
        ${Object.entries(PERSONAS).map(([id,p])=>`<button class="btn" style="display:flex;width:100%;padding:7px 11px;background:${S.settings.persona===id?"rgba(129,140,248,.18)":"none"};color:${S.settings.persona===id?S.settings.c2:"var(--tx)"};font-size:11px;border-radius:6px;gap:7px" onclick="S.settings.persona='${id}';S.pMenu=false;persistUser();renderMenus()">${p.i} ${p.n}</button>`).join("")}
      </div>
    </div>
    <button class="btn btn-sm" style="background:${S.imageMode?"rgba(245,158,11,.18)":"rgba(245,158,11,.08)"};border:1px solid rgba(245,158,11,${S.imageMode?".5":".2"});color:#f59e0b" onclick="S.imageMode=!S.imageMode;render()" title="وضع توليد الصور">🎨${S.imageMode?" نشط":""}</button>
    <button class="btn btn-sm" style="background:${S.webSearchMode?"rgba(16,185,129,.18)":"rgba(16,185,129,.08)"};border:1px solid rgba(16,185,129,${S.webSearchMode?".5":".2"});color:#10b981" onclick="S.webSearchMode=!S.webSearchMode;render()" title="بحث ويكيبيديا أثناء الرد">🌐${S.webSearchMode?" نشط":""}</button>
    <button class="btn btn-sm" style="background:${S.thinkMode?"rgba(129,140,248,.18)":"rgba(129,140,248,.08)"};border:1px solid rgba(129,140,248,${S.thinkMode?".5":".2"});color:#818cf8" onclick="S.thinkMode=!S.thinkMode;render()" title="تفكير عميق قبل الرد">🤔${S.thinkMode?" نشط":""}</button>`:""}
    <div style="flex:1"></div>
    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:16px;padding:3px 5px" title="تبديل المظهر">${S.settings.theme==="light"?"🌙":"☀️"}</button>
    ${!hasAnyKey()?`<div style="font-size:11px;color:#ef4444">⚠️ لا API</div>`:`<div style="width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite" title="متصل"></div>`}
  </div>`;

  const chatArea=`
    <div id="msgs" class="scroll" style="flex:1;padding:16px 14px;"></div>
    <div style="padding:8px 14px 14px;background:var(--cb);border-top:1px solid var(--bd);flex-shrink:0;">
      <div id="file-chips" style="display:flex;flex-wrap:wrap;gap:5px;max-width:800px;margin:0 auto 6px;"></div>
      <div style="max-width:800px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;">
        <div style="flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:14px;display:flex;align-items:flex-end;" id="inp-wrap">
          <textarea id="chat-inp" class="inp" style="flex:1;border:none;background:none;border-radius:14px;min-height:46px;max-height:130px;direction:rtl;font-size:${S.settings.fontSize||13}px" placeholder="${S.imageMode?"اوصف الصورة اللي عايزها... 🎨":"اكتب رسالتك... (Enter للإرسال)"}" rows="1"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,130)+'px'"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
          <div style="display:flex;align-items:center;padding:6px 8px;gap:2px;flex-shrink:0;">
            <input type="file" id="file-inp" multiple accept="image/*,.pdf,.txt,.csv,.md" style="display:none" onchange="handleFiles(this)"/>
            <button style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:18px;padding:3px 5px" onclick="document.getElementById('file-inp').click()" title="إرفاق">📎</button>
            ${SpeechRec?`<button id="mic-btn" style="background:none;border:none;cursor:pointer;color:${S.listening?"#ef4444":"var(--mt)"};font-size:18px;padding:3px 5px" onclick="toggleVoiceInput()" title="إدخال صوتي">${S.listening?"⏺️":"🎤"}</button>`:""}
            ${SpeechRec&&("speechSynthesis" in window)?`<button style="background:none;border:none;cursor:pointer;color:${S.voiceMode?"#10b981":"var(--mt)"};font-size:18px;padding:3px 5px" onclick="toggleVoiceMode()" title="محادثة صوتية">🎙️${S.voiceMode?"●":""}</button>`:""}
          </div>
        </div>
        <button onclick="S.streaming?stopStream():sendMsg()" style="width:48px;height:48px;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;cursor:pointer;border-radius:13px;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#000;box-shadow:0 0 16px rgba(34,211,238,.4)">▶</button>
      </div>
      <div style="text-align:center;font-size:10px;color:var(--mt);margin-top:5px;">${esc(S.global.appName||"NEXUS AI")} · ${prov.icon} ${prov.name} · Enter للإرسال · Shift+Enter سطر جديد</div>
    </div>`;

  document.getElementById("app").innerHTML=`<div class="layout">
    ${sidebar}
    <div class="content">
      ${topbar}
      ${broadcastBanner()}
      ${S.tab==="chat"?`<div style="flex:1;display:flex;flex-direction:column;min-height:0;">${chatArea}</div>`:`<div id="tab-content" class="scroll" style="flex:1;padding:16px;"></div>`}
    </div>
  </div>`;

  setTimeout(()=>{
    if(S.tab==="chat"){renderMsgs();scrollBottom();}
    else renderSettings();
    applyTheme();
  },10);

  document.addEventListener("click",e=>{
    if(S.mMenu||S.pMenu){if(!e.target.closest("#model-menu")&&!e.target.closest("#persona-menu")){S.mMenu=false;S.pMenu=false;renderMenus();}}
  },{once:true});
}

function renderMenus(){const mm=document.getElementById("model-menu");const pm=document.getElementById("persona-menu");if(mm)mm.style.display=S.mMenu?"block":"none";if(pm)pm.style.display=S.pMenu?"block":"none";}
function setModel(pid,mid){S.global.activeProvider=pid;S.global.providerModels[pid]=mid;S.mMenu=false;lss("nx7_global",S.global);render();}

function convListHTML(search=""){
  const q=search.trim().toLowerCase();
  const list=q?S.convs.filter(c=>(c.title||"").toLowerCase().includes(q)||c.msgs?.some(m=>gt(m.c).toLowerCase().includes(q))):S.convs;
  if(!list.length)return`<div style="font-size:11px;color:var(--mt);text-align:center;padding:20px;">لا توجد محادثات</div>`;
  return list.map(c=>`<div class="conv-item ${c.id===S.aid?"active":""}" onclick="S.aid='${c.id}';renderMsgs();renderConvList()">
    <div style="flex:1;min-width:0;"><div class="conv-title">💬 ${esc(c.title)}</div></div>
    <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0;">
      <button style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:9px;padding:1px 3px" onclick="event.stopPropagation();renameConv('${c.id}')" title="تسمية">✏️</button>
      <button style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:9px;padding:1px 3px" onclick="event.stopPropagation();delConv('${c.id}')" title="حذف">✕</button>
    </div>
  </div>`).join("");
}
function renderConvList(s=""){const el=document.getElementById("conv-list");if(el)el.innerHTML=convListHTML(s);}

function renderMsgs(){
  const el=document.getElementById("msgs");if(!el)return;
  const conv=ac();if(!conv){el.innerHTML="";return;}
  const prov=curProv();
  if(!conv.msgs||!conv.msgs.length){
    el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:20px">
      <div style="width:72px;height:72px;background:linear-gradient(135deg,${S.settings.c1},${S.settings.c2});border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 40px ${S.settings.c1}33">${esc(S.global.appIcon||"⚡")}</div>
      <div>
        <div style="font-size:22px;font-weight:900;background:linear-gradient(90deg,${S.settings.c1},${S.settings.c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent">${esc(S.global.appName||"NEXUS AI")}</div>
        <div style="font-size:11px;color:var(--mt);margin-top:4px">${prov.icon} ${prov.name} · ${PERSONAS[S.settings.persona]?.i} ${PERSONAS[S.settings.persona]?.n}</div>
      </div>
      ${!hasAnyKey()?`<div style="padding:10px 16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;font-size:12px;color:#ef4444">⚠️ لا يوجد API Key — تواصل مع الأدمن</div>`:""}
      ${S.global.fallbackEnabled?`<div style="font-size:10px;color:var(--c4);padding:4px 12px;background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);border-radius:20px">⚡ ${PROVIDERS.filter(p=>hasKey(p.id)).length} APIs مفعّلة مع Fallback تلقائي</div>`:""}
      <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:500px">
        ${["اشرح لي الذكاء الاصطناعي","اكتب كود Python بسيط","ترجم للإنجليزية: أهلاً","ما هو Machine Learning؟","اكتب قصة قصيرة","ساعدني في خطة عمل"].map(s=>`<button class="btn btn-ghost btn-sm" style="border-radius:20px" onclick="document.getElementById('chat-inp').value='${s}'">${s}</button>`).join("")}
      </div>
    </div>`;return;
  }
  el.innerHTML=conv.msgs.map(msg=>`
    <div class="msg-wrap" style="display:flex;flex-direction:column;align-items:${msg.role==="user"?"flex-end":"flex-start"};margin-bottom:16px">
      <div style="font-size:10px;color:var(--mt);margin-bottom:4px;display:flex;align-items:center;gap:5px">
        ${msg.role==="user"
          ?`<span style="width:18px;height:18px;background:linear-gradient(135deg,${S.settings.c1},${S.settings.c2});border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:700">${currentInitial()}</span> ${esc(currentName())}`
          :`<span style="color:${S.settings.c1}">${esc(S.global.appIcon||"⚡")}</span> ${esc(S.global.appName||"NEXUS AI")}${msg.provider?` <span style="opacity:.55">· ${PROVIDERS.find(p=>p.id===msg.provider)?.icon||""}</span>`:""} <span style="opacity:.45;font-size:9px">${msg.ts||""}</span>`}
      </div>
      <div style="max-width:88%;position:relative">
        ${msg.searching?`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#10b981;margin-bottom:5px"><div class="dots"><div class="dot" style="background:#10b981"></div><div class="dot" style="background:#10b981"></div><div class="dot" style="background:#10b981"></div></div> 🌐 جاري البحث${msg.searchQuery?` عن: ${esc(msg.searchQuery)}`:" في ويكيبيديا"}...</div>`:""}
        <div class="bubble ${msg.role==="user"?"bubble-user":msg.err?"bubble-ai bubble-err":"bubble-ai"}" ${msg.streaming?`id="stream-bubble"`:""}>${
          msg.image
            ?`<div class="mdb" style="margin-bottom:6px">${renderMD(gt(msg.c))}</div><div style="position:relative;min-height:120px"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:11px;gap:6px"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> جاري توليد الصورة...</div><img src="${esc(msg.image)}" loading="lazy" style="max-width:100%;border-radius:10px;display:block;position:relative" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none';this.previousElementSibling.innerHTML='⚠️ تعذّر توليد الصورة'"/></div>`
          :msg.role==="assistant"
            ?formatAssistantContent(gt(msg.c),msg.streaming)+(msg.streaming?`<span style="display:inline-block;width:2px;height:15px;background:${S.settings.c1};margin-right:3px;animation:blink .7s steps(1) infinite;border-radius:1px;vertical-align:middle"></span>`:"")
            :esc(gt(msg.c))+(msg.edited?` <span style="opacity:.5;font-size:9px">(معدّلة)</span>`:"")
        }</div>
        ${msg.role==="user"?`<div id="edit-area-${msg.id}" style="display:none;margin-top:6px;background:var(--cb);border:1px solid var(--bd);border-radius:10px;padding:8px">
          <textarea id="edit-inp-${msg.id}" class="inp" rows="2" style="margin-bottom:6px">${esc(gt(msg.c))}</textarea>
          <div style="display:flex;gap:6px;justify-content:flex-end">
            <button class="btn btn-sm btn-ghost" onclick="cancelEditMsg('${msg.id}')">إلغاء</button>

          </div>
        </div>`:""}
        ${msg.sources?.length?`<div style="font-size:10px;color:var(--mt);margin-top:4px;padding:0 4px">🌐 المصادر: ${msg.sources.map(s=>esc(s)).join("، ")}</div>`:""}

          <button class="btn btn-sm" style="background:rgba(15,20,34,.9);border:1px solid var(--bd);color:var(--mt)" onclick="copyMsg('${msg.id}')">📋</button>
          ${msg.role==="user"?`<button class="btn btn-sm" style="background:rgba(15,20,34,.9);border:1px solid var(--bd);color:var(--mt)" onclick="startEditMsg('${msg.id}')" title="تعديل">✏️</button>`:""}
          ${msg.role==="assistant"?`<button class="btn btn-sm" style="background:rgba(15,20,34,.9);border:1px solid var(--bd);color:var(--mt)" onclick="regenMsg()" title="إعادة توليد">🔄</button>
          ${("speechSynthesis" in window)?`<button class="btn btn-sm" style="background:rgba(15,20,34,.9);border:1px solid var(--bd);color:${S.speakingId===msg.id?"var(--c1)":"var(--mt)"}" onclick="speakMsg('${msg.id}')" title="قراءة صوتية">${S.speakingId===msg.id?"⏹️":"🔊"}</button>`:""}
          ${navigator.share?`<button class="btn btn-sm" style="background:rgba(15,20,34,.9);border:1px solid var(--bd);color:var(--mt)" onclick="shareMsg('${msg.id}')" title="مشاركة">📤</button>`:""}`:""}
          ${msg.image?`<a href="${esc(msg.image)}" download="nexus-image.jpg" target="_blank" class="btn btn-sm" style="background:rgba(15,20,34,.9);border:1px solid var(--bd);color:var(--mt);text-decoration:none" title="تحميل الصورة">⬇️</a>`:""}
        </div>`:""}
      </div>
    </div>`).join("")+
    (S.streaming?`<div style="display:flex;align-items:center;gap:9px;margin-bottom:14px"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span style="font-size:11px;color:var(--mt)">${esc(S.global.appIcon||"⚡")} يكتب...</span><button class="btn btn-sm btn-danger" onclick="stopStream()">⬛ إيقاف</button></div>`:"");
  scrollBottom();
}

function renderSettings(){
  const el=document.getElementById("tab-content");if(!el)return;
  const waLink=S.global.waLink||"#";
  el.innerHTML=`<div style="max-width:650px;margin:0 auto">
    <div style="font-size:15px;font-weight:800;color:${S.settings.c1};margin-bottom:16px">⚙️ الإعدادات</div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;margin-bottom:12px;color:${S.settings.c2}">🎭 الشخصية</div>

        <div><label class="inp-label">اللون الثانوي</label><input type="color" value="${S.settings.c2}" style="width:100%;height:36px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);cursor:pointer" onchange="S.settings.c2=this.value;applyTheme();persistUser()"/></div>

        ${[["#22d3ee","#818cf8"],["#10b981","#3b82f6"],["#f59e0b","#ef4444"],["#a78bfa","#ec4899"],["#6ee7b7","#34d399"]].map(([c1,c2])=>`<button onclick="S.settings.c1='${c1}';S.settings.c2='${c2}';applyTheme();persistUser();renderSettings()" style="width:40px;height:24px;background:linear-gradient(135deg,${c1},${c2});border:2px solid ${S.settings.c1===c1?"#fff":"transparent"};border-radius:6px;cursor:pointer"></button>`).join("")}

    <div class="card" style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:${S.settings.c2}">📚 ملفات مرجعية دائمة (${S.knowledge.length})</div>
      <div style="font-size:11px;color:var(--mt);margin-bottom:10px;line-height:1.7">ملفات (نص، CSV، Markdown) يحتفظ بها ${S.global.appName||"النظام"} كسياق دائم في كل محادثاتك — مفيدة لمعلومات مشروع أو بيانات تستخدمها باستمرار.</div>
      <input type="file" id="kb-file-inp" accept=".txt,.md,.csv,.json" style="display:none" onchange="addKnowledgeFile(this)"/>
      <button class="btn btn-sm btn-primary" style="margin-bottom:8px" onclick="document.getElementById('kb-file-inp').click()">+ رفع ملف مرجعي</button>
      ${S.knowledge.length?`<div style="display:flex;flex-direction:column;gap:5px">
        ${S.knowledge.map((k,i)=>`<div style="display:flex;align-items:center;gap:6px;padding:6px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;font-size:11px"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📄 ${esc(k.name)} <span style="color:var(--mt)">(${Math.round(k.content.length/1024)}كb)</span></span><button onclick="removeKnowledge(${i})" style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:11px">✕</button></div>`).join("")}
      </div>`:`<div style="font-size:11px;color:var(--mt);text-align:center;padding:8px">لا توجد ملفات مرجعية بعد</div>`}
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:#f59e0b">⭐ Premium</div>
      ${isPrem()?`<div style="padding:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;font-size:12px;color:#f59e0b">⭐ مفعّل${S.premium.expiry?` — حتى ${new Date(S.premium.expiry).toLocaleDateString("ar")}`:""}</div>`:`
      <div style="display:flex;gap:7px;margin-bottom:8px">
        <input id="code-inp" class="inp" style="flex:1;font-family:monospace;text-transform:uppercase" placeholder="NX7-XXXX-XXXX" oninput="this.value=this.value.toUpperCase()"/>
        <button class="btn btn-primary btn-sm" onclick="activateCode()">تفعيل</button>
      </div>
      <div id="code-msg" style="font-size:12px;margin-bottom:8px"></div>
      <div style="text-align:center;font-size:11px;color:var(--mt)">للحصول على كود: <a href="https://wa.me/${waLink}" target="_blank" style="color:var(--c4)">واتساب ←</a></div>`}
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:700;margin-bottom:10px">👤 الحساب</div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:10px">
        <div style="width:38px;height:38px;background:linear-gradient(135deg,${S.settings.c1},${S.settings.c2});border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#000">${currentInitial()}</div>
        <div><div style="font-size:13px;font-weight:700">${esc(currentName())}</div><div style="font-size:11px;color:${isPrem()?"#f59e0b":"var(--mt)"}">${isPrem()?"⭐ Premium":"🆓 مجاني"}</div></div>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="exportChats()">⬇️ تصدير المحادثات</button>
        <button class="btn btn-sm btn-danger" onclick="clearChats()">🗑️ مسح المحادثات</button>
        <button class="btn btn-sm btn-danger" onclick="doLogout()">🚪 تسجيل الخروج</button>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// CHAT FUNCTIONS
// ══════════════════════════════════════
let abortCtrl=null;let _stopFlag=false;
function scrollBottom(){setTimeout(()=>{const m=document.getElementById("msgs");if(m)m.scrollTop=m.scrollHeight;},50);}
function removeMemory(i){S.memory.splice(i,1);lss("nx7_memory",S.memory);const uid=currentUID();if(uid)fbD("nx7/users/"+uid+"/memory",S.memory);renderSettings();}
function clearMemory(){S.memory=[];lss("nx7_memory",[]);const uid=currentUID();if(uid)fbD("nx7/users/"+uid+"/memory",[]);renderSettings();notify("🗑️ تم حذف الذاكرة","warn");}
function persistMemFlag(){const uid=currentUID();if(uid)fbD("nx7/users/"+uid+"/memoryEnabled",S.memoryEnabled);}

function addKnowledgeFile(inp){
  const file=inp.files?.[0];if(!file)return;
  if(file.size>300000){notify("❌ الملف كبير جداً (الحد 300KB)","warn");inp.value="";return;}
  const r=new FileReader();
  r.onload=(e)=>{
    S.knowledge.push({name:file.name,content:String(e.target.result).slice(0,50000)});
    lss("nx7_knowledge",S.knowledge);
    const uid=currentUID();if(uid)fbD("nx7/users/"+uid+"/knowledge",S.knowledge);
    notify("✅ تمت إضافة "+file.name);
    renderSettings();
  };
  r.readAsText(file);
  inp.value="";
}
function removeKnowledge(i){
  S.knowledge.splice(i,1);lss("nx7_knowledge",S.knowledge);
  const uid=currentUID();if(uid)fbD("nx7/users/"+uid+"/knowledge",S.knowledge);
  renderSettings();
}

function newConv(){const id=uid4();S.convs.unshift({id,title:"محادثة جديدة",msgs:[],ts:Date.now()});S.aid=id;persistUser();render();}
function delConv(id){S.convs=S.convs.filter(c=>c.id!==id);if(!S.convs.length)S.convs=[{id:uid4(),title:"محادثة جديدة",msgs:[],ts:Date.now()}];if(S.aid===id)S.aid=S.convs[0].id;persistUser();render();}
function renameConv(id){const conv=S.convs.find(c=>c.id===id);if(!conv)return;const n=prompt("اسم المحادثة:",conv.title);if(n&&n.trim()){conv.title=n.trim();persistUser();renderConvList();}}
function stopStream(){_stopFlag=true;if(abortCtrl)abortCtrl.abort();S.streaming=false;const conv=ac();if(conv?.msgs?.length){const l=conv.msgs[conv.msgs.length-1];if(l.streaming)l.streaming=false;}persistUser();renderMsgs();}
function exportChats(){const txt=S.convs.map(c=>`# ${c.title}\n\n${(c.msgs||[]).map(m=>`**${m.role==="user"?currentName():(S.global.appName||"AI")}:**\n${gt(m.c)}`).join("\n\n---\n\n")}`).join("\n\n══════════\n\n");const b=new Blob([txt],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="nexus_chats.md";a.click();notify("✅ تم التصدير");}
function clearChats(){S.convs=[{id:uid4(),title:"محادثة جديدة",msgs:[],ts:Date.now()}];S.aid=S.convs[0].id;persistUser();render();notify("✅ تم المسح","warn");}

async function sendMsg(){
  const inp=document.getElementById("chat-inp");
  const text=inp?.value?.trim()||"";
  const files=window._ufiles||[];
  if(!text&&!files.length)return;
  if(S.streaming)return;
  if(!hasAnyKey()){notify("لا يوجد API Key — تواصل مع الأدمن","err");return;}
  if(!isPrem()&&S.msgCount>=(S.global.freeLimit||FREE_LIMIT_DEF)){notify("🔒 وصلت للحد المجاني — فعّل Premium من الإعدادات","warn");return;}
  const conv=ac();if(!conv)return;
  let userContent=text;
  if(files.length){
    const fileParts=files.map(f=>{
      if(f.type.startsWith("image/"))return`[صورة: ${f.name}]`;
      try{const decoded=atob(f.data);return`[ملف: ${f.name}]\n${decoded.slice(0,3000)}`;}catch{return`[ملف: ${f.name}]`;}
    }).join("\n\n");
    userContent=text?`${text}\n\n${fileParts}`:fileParts;
  }
  const imgFiles=files.filter(f=>f.type.startsWith("image/")).map(f=>({data:f.data,type:f.type}));
  const userMsg={id:uid4(),role:"user",c:userContent,ts:ts(),files:files.map(f=>({name:f.name,type:f.type})),images:imgFiles.length?imgFiles:undefined};
  if(!conv.msgs.length)conv.title=(text.slice(0,40)||files[0]?.name||"محادثة");
  conv.msgs.push(userMsg);conv.ts=Date.now();
  if(inp){inp.value="";inp.style.height="auto";}
  window._ufiles=[];
  const chips=document.getElementById("file-chips");if(chips)chips.innerHTML="";

  // ── وضع توليد الصور (Pollinations.ai — مجاني بدون مفتاح) ──
  if(S.imageMode){
    const aiMsg={id:uid4(),role:"assistant",c:"🎨 "+text,image:"https://image.pollinations.ai/prompt/"+encodeURIComponent(text)+"?width=1024&height=1024&nologo=true&model=flux&seed="+Date.now(),ts:ts()};
    conv.msgs.push(aiMsg);
    S.msgCount++;
    persistUser();renderMsgs();
    return;
  }

  S.streaming=true;
  const aiMsg={id:uid4(),role:"assistant",c:"",streaming:true,provider:S.global.activeProvider,ts:ts()};
  conv.msgs.push(aiMsg);renderMsgs();
  const apiMsgs=conv.msgs.slice(0,-1).map(m=>({role:m.role,content:cleanForContext(m.c),images:m.images}));
  await runAssistantTurn(aiMsg,apiMsgs);
}

// تشغيل دور المساعد: استدعاء الموديل، عرض المعاينة أثناء البث، ودعم حلقة "البحث الحي" (Agentic tool-use)
async function runAssistantTurn(aiMsg,apiMsgs){
  abortCtrl=new AbortController();_stopFlag=false;
  const streamCb=(full)=>{
    if(_stopFlag)return;
    aiMsg.c=full;
    const el=document.getElementById("stream-bubble");
    if(el){el.innerHTML=formatAssistantContent(full,true)+`<span style="display:inline-block;width:2px;height:15px;background:${S.settings.c1};margin-right:3px;animation:blink .7s steps(1) infinite;border-radius:1px;vertical-align:middle"></span>`;}
    const m=document.getElementById("msgs");if(m)m.scrollTop=m.scrollHeight;
  };
  try{
    let{text:result,provider}=await callAI(apiMsgs,sysPrompt(),true,streamCb,abortCtrl.signal);
    result=result||aiMsg.c;
    const sm=result.match(/\[SEARCH:\s*([^\]]+)\]/i);
    if(sm&&S.webSearchMode){
      const query=sm[1].trim();
      aiMsg.c="";aiMsg.searching=true;aiMsg.searchQuery=query;renderMsgs();
      const searchInfo=await wikiSearch(query);
      aiMsg.searching=false;
      if(searchInfo){
        aiMsg.sources=searchInfo.titles;
        const followMsgs=[...apiMsgs,
          {role:"assistant",content:result.replace(/\[SEARCH:[^\]]+\]/i,"").trim()||"(بحث عن: "+query+")"},
          {role:"user",content:`نتائج البحث في ويكيبيديا عن "${query}":\n\n${searchInfo.text}\n\nأكمل إجابتك على سؤالي السابق بالاستفادة من هذه النتائج إن كانت مفيدة.`}
        ];
        const r2=await callAI(followMsgs,sysPrompt(),true,streamCb,abortCtrl.signal);
        result=r2.text||"";provider=r2.provider;
      }else{
        result=result.replace(/\[SEARCH:[^\]]+\]/i,"").trim();
        if(!result)result="لم أتمكن من العثور على نتائج بحث، حاول إعادة صياغة السؤال.";
      }
    }
    aiMsg.c=extractMemories(result);aiMsg.streaming=false;aiMsg.provider=provider;
    S.msgCount++;
  }catch(e){if(e.name!=="AbortError"){aiMsg.c="❌ خطأ: "+e.message;aiMsg.err=true;}aiMsg.streaming=false;}
  S.streaming=false;persistUser();renderMsgs();
  if(S.voiceMode&&!aiMsg.err)speakMsg(aiMsg.id);
}

async function regenMsg(){
  const conv=ac();if(!conv||S.streaming)return;
  if(conv.msgs.length&&conv.msgs[conv.msgs.length-1].role==="assistant")conv.msgs.pop();
  S.streaming=true;
  const aiMsg={id:uid4(),role:"assistant",c:"",streaming:true,provider:S.global.activeProvider,ts:ts()};
  conv.msgs.push(aiMsg);renderMsgs();
  const apiMsgs=conv.msgs.slice(0,-1).map(m=>({role:m.role,content:cleanForContext(m.c),images:m.images}));
  await runAssistantTurn(aiMsg,apiMsgs);
}

// ── تعديل رسالة المستخدم (Fork): يحذف كل اللي بعدها ويعيد توليد الرد من النقطة دي ──
function startEditMsg(id){
  const m=findMsg(id);if(!m||m.role!=="user")return;
  const el=document.getElementById("edit-area-"+id);
  if(el)el.style.display="block";
  const ta=document.getElementById("edit-inp-"+id);
  if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
}
function cancelEditMsg(id){const el=document.getElementById("edit-area-"+id);if(el)el.style.display="none";}
async function submitEditMsg(id){
  const conv=ac();if(!conv||S.streaming)return;
  const ta=document.getElementById("edit-inp-"+id);
  const newText=(ta?.value||"").trim();
  if(!newText)return;
  const idx=conv.msgs.findIndex(m=>m.id===id);
  if(idx===-1)return;
  conv.msgs[idx].c=newText;
  conv.msgs[idx].edited=true;
  conv.msgs=conv.msgs.slice(0,idx+1); // حذف كل الردود اللاحقة (fork من هنا)
  S.streaming=true;
  const aiMsg={id:uid4(),role:"assistant",c:"",streaming:true,provider:S.global.activeProvider,ts:ts()};
  conv.msgs.push(aiMsg);renderMsgs();
  const apiMsgs=conv.msgs.slice(0,-1).map(m=>({role:m.role,content:cleanForContext(m.c),images:m.images}));
  await runAssistantTurn(aiMsg,apiMsgs);
}

function handleFiles(inp){
  if(!inp.files)return;
  Array.from(inp.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      if(!window._ufiles)window._ufiles=[];
      window._ufiles.push({name:f.name,type:f.type,data:ev.target.result.split(",")[1]});
      const chips=document.getElementById("file-chips");
      if(chips)chips.innerHTML=(window._ufiles||[]).map((fi,i)=>`<div style="display:flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.22);border-radius:20px;font-size:10px">${fi.type.startsWith("image/")?"🖼️":"📄"} ${esc(fi.name)}<button style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:9px" onclick="window._ufiles.splice(${i},1);this.parentElement.remove()">✕</button></div>`).join("");
    };r.readAsDataURL(f);
  });if(inp.value!==undefined)inp.value="";
}

// ── INIT ──
applyTheme();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{});});
}
window.addEventListener("load",()=>{
  firebase.initializeApp(firebaseConfig);
  _fbdb=firebase.database();
  firebase.auth().onAuthStateChanged(async (user)=>{
    if(user&&!user.isAnonymous){
      document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1117;flex-direction:column;gap:14px"><div style="font-size:36px">⚡</div><div style="color:#22d3ee;font-size:14px;font-weight:700">NEXUS AI</div><div style="color:#666;font-size:12px">جاري التحميل...</div></div>';
      try{
        const udata=await ensureUserDoc(user);
        const fco=await fb.get("nx7/codes");
        if(fco){const a=Object.values(fco).filter(Boolean);S.codes=a;lss("nx7_codes",a);}
        const fbc=await fb.get("nx7/o/broadcast");
        if(fbc)S.broadcast=fbc;
        await loadUserData(user.uid,udata);
        render();
      }catch(e){render();notify("⚠️ تعذّر الاتصال — تشغيل من الذاكرة المحلية","warn");}
    }else{
      if(user&&user.isAnonymous)firebase.auth().signOut();
      showAuth("login");
    }
  });
});
</script>
