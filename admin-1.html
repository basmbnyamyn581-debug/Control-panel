function _xk(){return"nx7k3y!";}
function encKey(s){if(!s)return"";let r="";for(let i=0;i<s.length;i++)r+=String.fromCharCode(s.charCodeAt(i)^_xk().charCodeAt(i%_xk().length));return btoa(r);}
function decKey(s){if(!s)return"";try{const b=atob(s);let r="";for(let i=0;i<b.length;i++)r+=String.fromCharCode(b.charCodeAt(i)^_xk().charCodeAt(i%_xk().length));return r;}catch{return s;}}
function decKeys(obj){const r={};Object.keys(obj||{}).forEach(k=>{r[k]=decKey(obj[k]);});return r;}
function encKeys(obj){const r={};Object.keys(obj||{}).forEach(k=>{r[k]=encKey(obj[k]);});return r;}

async function doAdminLogin(){
  const email=(document.getElementById("a-email")?.value||"").trim();
  const pass=document.getElementById("a-pass")?.value||"";
  const ae=document.getElementById("ae");const ab=document.getElementById("ab");
  if(!email||!pass){ae.textContent="❌ أدخل البريد وكلمة السر";ae.style.display="block";return;}
  if(ab)ab.textContent="⏳ جارٍ...";
  try{
    await firebase.auth().signInWithEmailAndPassword(email,pass);
  }catch(e){
    ae.textContent=authErr(e.code);ae.style.display="block";
    if(ab)ab.textContent="دخول 🔑";
  }
}

async function doAdminRegister(){
  const email=(document.getElementById("a-email")?.value||"").trim();
  const pass=document.getElementById("a-pass")?.value||"";
  const ae=document.getElementById("ae");const ab=document.getElementById("ab");
  if(!email||!pass){ae.textContent="❌ أدخل البريد وكلمة السر";ae.style.display="block";return;}
  if(pass.length<6){ae.textContent="❌ كلمة السر يجب أن تكون 6 أحرف على الأقل";ae.style.display="block";return;}
  if(ab)ab.textContent="⏳ جارٍ...";
  try{
    await firebase.auth().createUserWithEmailAndPassword(email,pass);
  }catch(e){
    ae.textContent=authErr(e.code);ae.style.display="block";
    if(ab)ab.textContent="إنشاء حساب ✨";
  }
}

async function adminGoogleSignIn(){
  const ae=document.getElementById("ae");
  try{
    await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
  }catch(e){
    if(e.code!=="auth/popup-closed-by-user"&&ae){ae.textContent=authErr(e.code);ae.style.display="block";}
  }
}

async function doAdminForgot(){
  const email=(document.getElementById("f-email")?.value||"").trim();
  const ae=document.getElementById("ae");const ao=document.getElementById("ao");const ab=document.getElementById("ab");
  if(!email){ae.textContent="❌ أدخل بريدك الإلكتروني";ae.style.display="block";return;}
  if(ab)ab.textContent="⏳ جارٍ...";
  try{
    await firebase.auth().sendPasswordResetEmail(email);
    ao.textContent="✅ تم إرسال رابط إعادة التعيين إلى بريدك";ao.style.display="block";ae.style.display="none";
  }catch(e){
    ae.textContent=authErr(e.code);ae.style.display="block";
  }
  if(ab)ab.textContent="إرسال رابط إعادة التعيين";
}

function adminLogout(){firebase.auth().signOut();}

async function loadAll(){
  const fg=await fb.get("nx7/o/global");
  if(fg){if(fg.apiKeys)fg.apiKeys=decKeys(fg.apiKeys);Object.assign(S.global,fg);lss("nx7_global",S.global);}
  const fc=await fb.get("nx7/codes");
  if(fc){S.codes=Object.values(fc).filter(Boolean);lss("nx7_codes",S.codes);}
  const fb_=await fb.get("nx7/o/broadcast");
  if(fb_)S.broadcast=fb_;
  const fu=await fb.get("nx7/users");
  if(fu)S.users=fu;
}

function setBroadcast(active){
  const text=(document.getElementById("bc-text")?.value||"").trim();
  if(active&&!text){notify("❌ اكتب رسالة أولاً","warn");return;}
  S.broadcast={active,text:active?text:S.broadcast.text,ts:Date.now()};
  fb.set("nx7/o/broadcast",S.broadcast);
  notify(active?"📢 تم النشر للجميع":"تم إخفاء الإعلان","ok");
  render();
}

function exportUsersCSV(){
  const rows=[["الاسم","البريد الإلكتروني","Premium","تاريخ الانتهاء","عدد الرسائل","تاريخ التسجيل"]];
  Object.values(S.users||{}).forEach(u=>{
    const prem=u?.premium?.active&&(!u.premium.expiry||Date.now()<u.premium.expiry);
    rows.push([
      u?.name||"",
      u?.email||"",
      prem?"نشط":"لا",
      u?.premium?.expiry?new Date(u.premium.expiry).toLocaleDateString("ar-EG"):"",
      String(u?.msgCount||0),
      u?.created?new Date(u.created).toLocaleDateString("ar-EG"):""
    ]);
  });
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="nexus_users_"+Date.now()+".csv";a.click();
  notify("✅ تم تصدير "+(Object.keys(S.users||{}).length)+" مستخدم");
}

      <div class="stat-card"><div style="font-size:22px;font-weight:800;color:#a78bfa">${S.codes.length}</div><div style="font-size:10px;color:var(--mt)">أكواد التفعيل</div></div>

        <div class="toggle ${S.global.fallbackEnabled?"on":""}" onclick="S.global.fallbackEnabled=!S.global.fallbackEnabled;saveGlobal();render()"></div>

          ${p.id==="cloudflare"?'<div style="font-size:9px;color:var(--mt)">format: accountId|apiToken</div>':""}
          </div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:4px;padding:0 4px">
          <input id="key-${p.id}" type="password" class="inp" style="flex:1;font-family:monospace;font-size:11px" placeholder="API Key..." value="${esc(S.global.apiKeys[p.id]||"")}" dir="ltr"/>

          ${hasKey(p.id)?`<button class="btn btn-sm btn-danger" onclick="S.global.apiKeys['${p.id}']='';document.getElementById('key-${p.id}').value='';saveGlobal();render();notify('تم الحذف','warn')">✕</button>`:""}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;padding:0 4px">
          ${p.models.map(m=>`<button class="btn btn-sm" style="background:${S.global.providerModels[p.id]===m.id?"rgba(34,211,238,.15)":"rgba(15,20,34,.7)"};border:1px solid ${S.global.providerModels[p.id]===m.id?"rgba(34,211,238,.4)":"var(--bd)"};color:${S.global.providerModels[p.id]===m.id?"var(--c1)":"var(--mt)"}" onclick="S.global.providerModels['${p.id}']='${m.id}';saveGlobal();render()">${m.n}</button>`).join("")}

        <div style="display:flex;gap:7px"><input id="aname" class="inp" value="${esc(S.global.appName||"NEXUS AI")}"/><button class="btn btn-primary btn-sm" onclick="S.global.appName=document.getElementById('aname').value||'NEXUS AI';saveGlobal();notify('✅ تم')">حفظ</button></div>

        <div style="display:flex;gap:7px"><input id="await" class="inp" dir="ltr" placeholder="201xxxxxxxxx" value="${esc(S.global.waLink||"")}"/><button class="btn btn-primary btn-sm" onclick="S.global.waLink=document.getElementById('await').value||'';saveGlobal();notify('✅ تم')">حفظ</button></div>
      </div>
      <label class="inp-label">حد الرسائل المجانية (${S.global.freeLimit||FREE_LIMIT_DEF})</label>
      <input type="range" min="5" max="200" value="${S.global.freeLimit||FREE_LIMIT_DEF}" style="accent-color:var(--c1);width:100%" oninput="S.global.freeLimit=parseInt(this.value);this.previousElementSibling.textContent='حد الرسائل المجانية ('+this.value+')'" onchange="saveGlobal()"/>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:#a78bfa">📢 رسالة إعلانية للمستخدمين</div>
        ${S.broadcast?.active?`<span style="font-size:9px;padding:2px 8px;border-radius:5px;background:rgba(16,185,129,.15);color:#10b981">نشطة</span>`:""}

      <div style="display:flex;gap:7px;margin-top:8px">
        <button class="btn btn-primary btn-sm" onclick="setBroadcast(true)">📢 نشر للجميع</button>
        ${S.broadcast?.active?`<button class="btn btn-sm btn-danger" onclick="setBroadcast(false)">🗑️ إخفاء</button>`:""}
      </div>

        <input id="code-days" class="inp" type="number" style="width:80px" value="30" min="1" max="365"/>

        <button class="btn btn-sm btn-primary" onclick="exportUsersCSV()">⬇️ تصدير CSV</button>

function saveGlobal(){
  const gToSave={...S.global,apiKeys:encKeys(S.global.apiKeys)};
  fbD("nx7/o/global",gToSave);lss("nx7_global",S.global);
}
function saveKey(pid){const val=(document.getElementById("key-"+pid)?.value||"").trim();S.global.apiKeys[pid]=val;saveGlobal();render();notify(val?"✅ تم حفظ الـ Key":"تم الحذف",val?"ok":"warn");}

function generateCode(){
  const days=parseInt(document.getElementById("code-days")?.value||"30");
  const note=document.getElementById("code-note")?.value||"";
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code="NX7-";for(let i=0;i<4;i++)code+=chars[~~(Math.random()*chars.length)];
  code+="-"+Array.from({length:4},()=>chars[~~(Math.random()*chars.length)]).join("");
  const newEntry={code,days,note,created:Date.now(),used:false};
  S.codes.unshift(newEntry);
  lss("nx7_codes",S.codes);
  fb.set("nx7/codes",a2o(S.codes,"code"));
  navigator.clipboard.writeText(code).catch(()=>{});
  if(document.getElementById("code-note"))document.getElementById("code-note").value="";
  notify("✅ "+code+" — تم النسخ");
  const cl=document.getElementById("codes-list");if(cl)cl.innerHTML=codesHTML();
}
function deleteCode(code){
  S.codes=S.codes.filter(c=>c.code!==code);
  lss("nx7_codes",S.codes);
  fb.set("nx7/codes",a2o(S.codes,"code"));
  const cl=document.getElementById("codes-list");if(cl)cl.innerHTML=codesHTML();
  notify("🗑️ تم الحذف","warn");
}

function codesHTML(){
  if(!S.codes.length)return`<div style="font-size:11px;color:var(--mt);text-align:center;padding:12px">لا توجد أكواد</div>`;
  return S.codes.map(c=>`<div style="display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg);border-radius:7px;margin-bottom:4px;border:1px solid var(--bd)">
    <code style="flex:1;font-size:11px;color:${c.used?"var(--mt)":"var(--c4)"};font-family:monospace;letter-spacing:1px">${c.code}</code>
    <span style="font-size:9px;color:var(--mt)">${c.days}يوم</span>
    ${c.note?`<span style="font-size:9px;color:var(--mt)">${esc(c.note)}</span>`:""}
    <span style="font-size:9px;padding:2px 7px;border-radius:5px;background:${c.used?"rgba(100,100,100,.2)":"rgba(16,185,129,.15)"};color:${c.used?"var(--mt)":"var(--c4)"}">${c.used?"مستخدم":"متاح"}</span>
    <button onclick="navigator.clipboard.writeText('${c.code}').then(()=>notify('✓ نُسخ'))" style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:11px">📋</button>
    <button onclick="deleteCode('${c.code}')" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:11px">🗑️</button>
  </div>`).join("");
}

function usersHTML(userList){
  if(!userList.length)return`<div style="font-size:11px;color:var(--mt);text-align:center;padding:12px">لا يوجد مستخدمين</div>`;
  return userList.map(([uid,u])=>{
    const prem=u?.premium?.active&&(!u.premium.expiry||Date.now()<u.premium.expiry);
    return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px;border:1px solid var(--bd)">
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700">${esc(u?.name||"—")}</div>
        <div style="font-size:9px;color:var(--mt)" dir="ltr">${esc(u?.email||"")}</div>
      </div>
      <div style="font-size:9px;color:var(--mt)">${u?.msgCount||0} رسالة</div>
      <span style="font-size:9px;padding:2px 7px;border-radius:5px;background:${prem?"rgba(245,158,11,.15)":"rgba(100,100,100,.15)"};color:${prem?"#f59e0b":"var(--mt)"}">${prem?"⭐ Premium":"🆓 مجاني"}</span>
      <button onclick="togglePremium('${uid}',${prem})" class="btn btn-sm ${prem?"btn-danger":"btn-primary"}">${prem?"إلغاء":"تفعيل 30ي"}</button>
    </div>`;
  }).join("");
}

async function togglePremium(uid,currentlyPrem){
  const newPrem=currentlyPrem?{active:false,expiry:null}:{active:true,expiry:Date.now()+30*86400000};
  await fb.set("nx7/users/"+uid+"/premium",newPrem);
  if(S.users[uid])S.users[uid].premium=newPrem;
  render();
  notify(currentlyPrem?"تم إلغاء Premium":"✅ تم تفعيل Premium لـ 30 يوم");
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
async function initAdmin(){
  document.getElementById("app").innerHTML=`<div style="height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div style="font-size:44px;animation:spin 2s linear infinite">👑</div><div style="color:#22d3ee;font-size:15px">جاري التحميل...</div></div>`;
  await loadAll();
  render();
}

window.addEventListener("load",()=>{
  firebase.auth().onAuthStateChanged(async (user)=>{
    if(user&&!user.isAnonymous){
      let adminUid=await fb.get("nx7/admin/uid");
      if(!adminUid){
        await fb.set("nx7/admin/uid",user.uid);
        adminUid=user.uid;
        notify("✅ تم تعيين هذا الحساب كأدمن للوحة");
      }
      if(adminUid===user.uid)initAdmin();
      else showNotAdmin();
    }else{
      if(user&&user.isAnonymous)firebase.auth().signOut();
      showAdminAuth();
    }
  });
});
</script>
